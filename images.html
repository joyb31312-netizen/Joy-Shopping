<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pro Visuals | HD Gallery & Gear</title>
    <style>
        /* --- 1. CORE STYLES --- */
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            background-color: #f4f4f7; 
            color: #1d1d1f;
            line-height: 1.6;
        }

        /* --- 2. HEADER & MENU --- */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 5%;
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            position: sticky;
            top: 0;
            z-index: 1000;
            border-bottom: 1px solid #e5e5e5;
        }
        .logo { font-size: 1.5rem; font-weight: 800; color: #007AFF; text-decoration: none; }
        
        .menu-wrapper { position: relative; }
        .three-dots {
            font-size: 28px;
            cursor: pointer;
            padding: 5px 12px;
            border-radius: 50%;
            transition: 0.2s;
        }
        .three-dots:hover { background: #f0f0f0; }

        .dropdown-menu {
            display: none;
            position: absolute;
            right: 0;
            top: 45px;
            background: white;
            min-width: 200px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.15);
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid #eee;
        }
        .dropdown-menu.show { display: block; }
        .dropdown-menu ul { list-style: none; }
        .dropdown-menu li a {
            display: block;
            padding: 12px 20px;
            text-decoration: none;
            color: #333;
            font-size: 0.95rem;
        }
        .dropdown-menu li a:hover { background: #f5f5f7; color: #007AFF; }

        /* --- 3. YOUTUBE AD BANNER --- */
        .yt-banner {
            max-width: 1100px;
            margin: 30px auto;
            padding: 0 20px;
        }
        .yt-card {
            background: linear-gradient(90deg, #FF0000, #cc0000);
            color: white;
            padding: 20px;
            border-radius: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            text-decoration: none;
            transition: transform 0.3s;
        }
        .yt-card:hover { transform: scale(1.01); }
        .yt-info h3 { font-size: 1.2rem; margin-bottom: 5px; }
        .subscribe-btn {
            background: white;
            color: #FF0000;
            padding: 8px 18px;
            border-radius: 20px;
            font-weight: bold;
            font-size: 0.8rem;
        }

        /* --- 4. PHOTO GRID (MASONRY) --- */
        .container { max-width: 1200px; margin: 0 auto; padding: 20px; }
        .photo-grid {
            column-count: 4;
            column-gap: 20px;
        }
        @media (max-width: 900px) { .photo-grid { column-count: 2; } }
        @media (max-width: 600px) { .photo-grid { column-count: 1; } }

        .photo-card {
            background: white;
            margin-bottom: 20px;
            break-inside: avoid;
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            transition: 0.3s;
            position: relative;
        }
        .photo-card:hover { transform: translateY(-5px); }
        .photo-card img { width: 100%; display: block; }

        .photo-info {
            padding: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .btn-download {
            background: #007AFF;
            color: white;
            text-decoration: none;
            padding: 7px 15px;
            border-radius: 8px;
            font-size: 0.85rem;
            font-weight: 600;
        }
        /* Premium Badge */
        .premium-tag {
            position: absolute;
            top: 10px;
            left: 10px;
            background: #FFD700;
            color: #000;
            padding: 4px 8px;
            font-size: 0.7rem;
            font-weight: 800;
            border-radius: 5px;
        }

        /* --- 5. AFFILIATE GEAR SECTION --- */
        .gear-section {
            background: #fff;
            padding: 40px;
            border-radius: 20px;
            margin: 40px 0;
            border: 1px solid #e5e5e5;
        }
        .gear-list { margin-top: 20px; list-style: none; }
        .gear-item { 
            padding: 15px 0; 
            border-bottom: 1px solid #eee; 
            display: flex;
            justify-content: space-between;
        }
        .gear-item a { color: #FF4B2B; font-weight: bold; text-decoration: none; }

        footer { text-align: center; padding: 60px; color: #888; }
    </style>
</head>
<body>

    <script>
        const menuBtn = document.getElementById('menuBtn');
        const dropdown = document.getElementById('dropdown');

        menuBtn.addEventListener('click', (e) => {
            dropdown.classList.toggle('show');
            e.stopPropagation();
        });

        window.addEventListener('click', () => {
            dropdown.classList.remove('show');
        });
    </script>

</body>
</html>
